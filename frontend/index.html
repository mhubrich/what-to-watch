<!doctype html>
<html lang="en">

<head>
  <!-- Meta -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- Primary Meta Tags -->
  <title>What To Watch</title>
  <meta name="title" content="What To Watch">
  <meta name="description" content="What To Watch is a movie watchlist">
  <meta name="author" content="Markus Hubrich">
  <!-- Meta for Open Graph / Facebook -->
  <meta name="title" property="og:title" content="What To Watch">
  <meta name="description" property="og:description" content="What To Watch is a movie watchlist">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://markushubrich.me/what-to-watch">
  <!-- Meta for Twitter -->
  <meta property="twitter:title" content="What To Watch">
  <meta property="twitter:description" content="What To Watch is a movie watchlist">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:domain" content="markushubrich.me">
  <meta property="twitter:url" content="https://markushubrich.me/what-to-watch">
  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <!-- PWA Optimizations -->
  <meta name="theme-color" content="#F2F2F2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="What To Watch" />
  <!-- PWA Manifest -->
  <link rel="manifest" href="/app.webmanifest" />
  <!-- Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</html>
